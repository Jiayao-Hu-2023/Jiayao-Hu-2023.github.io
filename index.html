<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 顶部品牌标识 -->
        <div class="verification-header">
            <div class="lock-icon">🔒</div>
            <span><span class="click-text">Click</span><span class="hub-text">Hub</span></span>
        </div>

        <!-- 主卡片 -->
        <div class="main-card">
            <!-- 语言选择器 -->
            <div class="language-selector">
                <select id="languageSelect">
                    <option value="en-US">English</option>
                    <option value="zh-CN">简体中文</option>
                    <option value="zh-TW">繁體中文</option>
                    <option value="ja-JP">日本語</option>
                    <option value="ko-KR">한국어</option>
                    <option value="fr-FR">Français</option>
                    <option value="de-DE">Deutsch</option>
                    <option value="ru-RU">Русский</option>
                    <option value="es-ES">Español</option>
                    <option value="pt-PT">Português</option>
                    <option value="hi-IN">हिन्दी</option>
                    <option value="nl-NL">Nederlands</option>
                    <option value="it-IT">Italiano</option>
                </select>
            </div>
            <h1 class="warning-title" data-i18n="warningTitle">这是个成人网站</h1>
            <p class="warning-text" data-i18n="warningText">
                根据相关法律法规，您必须年满18周岁才能访问本网站内容。
                点击下方按钮确认您已满足年龄要求。
            </p>
            
            <!-- 追逐按钮 -->
            <div class="button-container">
                <button id="ageButton" class="age-button" data-i18n="ageButton">我已满18岁，进入</button>
            </div>
            
            <!-- 尝试次数计数器 -->
            <div id="attemptCounter" class="attempt-counter" data-i18n="attemptCounter">尝试次数: <span id="attemptCount">0</span></div>
        </div>

        <!-- 退出按钮 -->
        <div class="footer">
            <button id="exitButton" class="exit-button" data-i18n="exitButton">退出</button>
            <div class="copyright" data-i18n="copyright">© 2026 ClickHub · 18 U.S.C. 2257 合规声明</div>
        </div>

        <!-- 对话框元素 -->
        <div id="dialog" class="dialog hidden">
            <div class="dialog-content">
                <p id="dialogText"></p>
                <button id="dialogConfirm" class="dialog-confirm" data-i18n="dialogConfirm">确认</button>
            </div>
        </div>

        <!-- 最终投降页面 -->
        <div id="surrenderPage" class="surrender-page hidden">
            <div class="surrender-content">
                <h2 data-i18n="surrenderTitle">行吧，你赢了。</h2>
                <div class="reveal-text">
                    <p data-i18n="surrenderTime">你追着一个按钮追了 <span id="chaseTime">0</span> 秒。</p>
                    <p data-i18n="surrenderContent1">你以为这里面有什么？成人内容？</p>
                    <p data-i18n="surrenderContent2">其实这里面只有一个道理——</p>
                    <p data-i18n="surrenderContent3">成年人要学会面对 “得不到” 。</p>
                    <p class="final-message" data-i18n="surrenderFinal">愚人节快乐！ 😜</p>
                </div>
                
                <!-- 成就解锁 -->
                <div class="achievement">
                    <div class="trophy">🏆</div>
                    <h3 data-i18n="achievementTitle">按钮追逐大师</h3>
                    <p data-i18n="achievementYear">2026 年愚人节特别成就</p>
                    <p class="stats" data-i18n="achievementStats">追逐次数: <span id="finalAttempts">0</span></p>
                    <p class="subtext" data-i18n="achievementSubtext">你的耐心已经超越了 99% 的人类。</p>
                </div>

                <!-- 重置按钮 -->
                <button id="resetButton" class="reset-button" data-i18n="resetButton">再来一次</button>
                
                <!-- GitHub项目源码标识 -->
                <div class="github-link">
                    <a href="https://github.com/Jiayao-Hu-2023/Jiayao-Hu-2023.github.io" target="_blank" rel="noopener noreferrer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="github-icon"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
