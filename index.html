<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 顶部品牌标识 -->
        <div class="verification-header">
            <div class="lock-icon">🔒</div>
            <span><span class="click-text">Click</span><span class="hub-text">Hub</span></span>
        </div>

        <!-- 主卡片 -->
        <div class="main-card">
            <h1 class="warning-title">这是个成人网站</h1>
            <p class="warning-text">
                根据相关法律法规，您必须年满18周岁才能访问本网站内容。
                点击下方按钮确认您已满足年龄要求。
            </p>
            
            <!-- 追逐按钮 -->
            <div class="button-container">
                <button id="ageButton" class="age-button">我已满18岁，进入</button>
            </div>
            
            <!-- 尝试次数计数器 -->
            <div id="attemptCounter" class="attempt-counter">尝试次数: <span id="attemptCount">0</span></div>
        </div>

        <!-- 退出按钮 -->
        <div class="footer">
            <button id="exitButton" class="exit-button">退出</button>
            <div class="copyright">© 2026 ClickHub · 18 U.S.C. 2257 合规声明</div>
        </div>

        <!-- 对话框元素 -->
        <div id="dialog" class="dialog hidden">
            <div class="dialog-content">
                <p id="dialogText"></p>
                <button id="dialogConfirm" class="dialog-confirm">确认</button>
            </div>
        </div>

        <!-- 最终投降页面 -->
        <div id="surrenderPage" class="surrender-page hidden">
            <div class="surrender-content">
                <h2>行吧，你赢了。</h2>
                <div class="reveal-text">
                    <p>你追着一个按钮追了 <span id="chaseTime">0</span> 秒。</p>
                    <p>你以为这里面有什么？成人内容？</p>
                    <p>其实这里面只有一个道理——</p>
                    <p>成年人要学会面对 “得不到” 。</p>
                    <p class="final-message">愚人节快乐！ 😜</p>
                </div>
                
                <!-- 成就解锁 -->
                <div class="achievement">
                    <div class="trophy">🏆</div>
                    <h3>按钮追逐大师</h3>
                    <p>2026 年愚人节特别成就</p>
                    <p class="stats">追逐次数: <span id="finalAttempts">0</span></p>
                    <p class="subtext">你的耐心已经超越了 99% 的人类。</p>
                </div>

                <!-- 重置按钮 -->
                <button id="resetButton" class="reset-button">再来一次</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
