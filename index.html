<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026马年新春祝福</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 语言切换按钮 -->
    <div class="language-switcher">
        <button onclick="switchLanguage('zh-CN')">简体中文</button>
        <button onclick="switchLanguage('zh-TW')">繁體中文</button>
        <button onclick="switchLanguage('en-US')">English</button>
    </div>

    <!-- 页面容器 -->
    <div class="page-container">
        <!-- 第一页：封面 -->
        <section class="page page-1">
            <div class="content">
                <h1 data-lang-key="cover-title">2026 马年大吉</h1>
                <p data-lang-key="cover-subtitle">新春快乐 · 万事如意</p>
                <div class="fireworks-container" id="fireworks"></div>
            </div>
        </section>

        <!-- 第二页：节日问候 -->
        <section class="page page-2">
            <div class="content">
                <h2 data-lang-key="page2-title">节日问候</h2>
                <p data-lang-key="page2-content">在这辞旧迎新的美好时刻，向您致以最诚挚的节日问候。愿您在新的一年里，事业蒸蒸日上，生活幸福美满，阖家欢乐安康！</p>
            </div>
        </section>

        <!-- 第三页：祝福语 -->
        <section class="page page-3">
            <div class="content">
                <h2 data-lang-key="page3-title">新春祝福</h2>
                <p data-lang-key="page3-content">马年到，好运来！愿您策马奔腾，事业有成；马到成功，财源广进；龙马精神，健康长寿；一马当先，万事顺意！</p>
            </div>
        </section>

        <!-- 第四页：感恩有你 -->
        <section class="page page-4">
            <div class="content">
                <h2 data-lang-key="page4-title">感恩有你</h2>
                <p data-lang-key="page4-content">感恩一路有您的陪伴与支持，是您的鼓励让我不断前进。新的一年，愿我们继续携手同行，共创美好未来！</p>
            </div>
        </section>

        <!-- 第五页：节日祝福 -->
        <section class="page page-5">
            <div class="content">
                <h2 data-lang-key="page5-title">温馨祝福</h2>
                <p data-lang-key="page5-content">愿新春的钟声带给您吉祥如意，愿新春的气息带给您健康平安，愿新春的祝福带给您幸福快乐，愿您在新的一年里心想事成，万事如意！</p>
            </div>
        </section>

        <!-- 第六页：制作信息 -->
        <section class="page page-6">
            <div class="content">
                <h2 data-lang-key="page6-title">胡嘉耀 制作</h2>
                <p data-lang-key="page6-content">感谢您的观看，祝您新春快乐，马年大吉！</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
